<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masters 2026 Sweepstakes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Work+Sans:wght@300..700&display=swap" rel="stylesheet">
<style>
:root {
  --gold:#c9a84c;--gold-light:#e8c96a;--gold-dim:#8a6e2a;
  --green-dark:#0a2a0a;--green-mid:#1a3a1a;--green-bright:#1e5c1e;
  --green-border:#2a5a2a;--green-muted:#3a7a3a;
  --cream:#f5f0e8;--cream-dim:#c8c0b0;
  --surface:#122412;--surface-2:#0d1f0d;
  --font-display:'Playfair Display',Georgia,serif;
  --font-body:'Work Sans','Helvetica Neue',sans-serif;
  --radius-sm:4px;--radius-md:8px;--radius-lg:12px;
  --transition:180ms cubic-bezier(0.16,1,0.3,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth;}
body{font-family:var(--font-body);background:var(--green-mid);color:var(--cream);min-height:100vh;font-size:16px;}
button,input,select{font:inherit;color:inherit;}
header{background:linear-gradient(160deg,#061206 0%,#0f2e0f 50%,#071a07 100%);border-bottom:3px solid var(--gold);padding:28px 20px 22px;text-align:center;position:relative;overflow:hidden;}
header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(201,168,76,0.08) 0%,transparent 70%);pointer-events:none;}
header h1{font-family:var(--font-display);font-size:clamp(1.6rem,4vw,2.6rem);color:var(--gold);letter-spacing:1px;line-height:1.15;}
.live-bar{background:#061206;border-bottom:1px solid var(--green-border);padding:9px 16px;display:flex;justify-content:center;align-items:center;gap:8px;font-size:0.8rem;color:#6a9a6a;}
.live-dot{width:7px;height:7px;background:#4caf50;border-radius:50%;flex-shrink:0;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.4;transform:scale(0.8);}}
.container{max-width:1100px;margin:0 auto;padding:20px 16px;}
.tabs{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;}
.tab-btn{padding:9px 20px;border:1.5px solid var(--gold-dim);background:transparent;color:var(--gold-dim);cursor:pointer;border-radius:var(--radius-sm);font-size:0.9rem;font-weight:500;transition:all var(--transition);}
.tab-btn.active,.tab-btn:hover{background:var(--gold);color:var(--green-dark);border-color:var(--gold);}
.tab-content{display:none;}
.tab-content.active{display:block;}
table{width:100%;border-collapse:collapse;}
th{background:var(--surface-2);color:var(--gold);padding:11px 10px;text-align:left;font-size:0.75rem;letter-spacing:1.2px;text-transform:uppercase;border-bottom:2px solid var(--gold-dim);font-weight:600;}
td{padding:12px 10px;border-bottom:1px solid var(--green-border);font-size:0.875rem;vertical-align:middle;}
tr:nth-child(even) td{background:rgba(255,255,255,0.02);}
tbody tr:hover td{background:rgba(201,168,76,0.07);}
.rank{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%;font-weight:700;font-size:0.85rem;flex-shrink:0;}
.rank-1{background:#FFD700;color:#1a1000;}
.rank-2{background:#C0C0C0;color:#1a1a1a;}
.rank-3{background:#CD7F32;color:#fff;}
.rank-x{background:var(--green-border);color:var(--cream-dim);}
.tags{display:flex;flex-wrap:wrap;gap:4px;}
.tag{display:inline-flex;align-items:center;gap:3px;background:var(--green-bright);border:1px solid var(--green-muted);border-radius:3px;padding:3px 8px;font-size:0.75rem;line-height:1.3;}
.tag.scoring{background:#2a4a05;border-color:var(--gold-dim);color:var(--gold-light);}
.tag .mult{font-size:0.68rem;color:var(--gold);font-weight:700;margin-left:1px;}
.tag.scoring .mult{color:#fff;}
.score{font-size:1.25rem;font-weight:700;color:var(--gold);font-family:var(--font-display);}
.score-zero{color:#4a6a4a;}
.pos{font-weight:700;color:var(--gold);}
.mbadge{background:var(--gold);color:var(--green-dark);border-radius:3px;padding:2px 8px;font-size:0.75rem;font-weight:700;}
.no-mult{color:#4a6a4a;font-size:0.78rem;}
@media(max-width:600px){
  header{padding:20px 14px 16px;}
  th,td{padding:9px 7px;font-size:0.78rem;}
  .score{font-size:1rem;}
  .tag{font-size:0.7rem;padding:2px 5px;}
}
</style>
</head>
<body>

<header>
  <h1>⛳ Masters 2026 Sweepstakes</h1>
</header>

<div class="live-bar">
  <div class="live-dot"></div>
  <span id="liveStatus">Loading scores...</span>
</div>

<div class="container">
  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('standings',this)">🏆 Standings</button>
    <button class="tab-btn" onclick="showTab('leaderboard',this)">📋 Leaderboard</button>
  </div>

  <div class="tab-content active" id="tab-standings">
    <table>
      <thead><tr>
        <th style="width:52px">Rank</th>
        <th>Participant</th>
        <th>Picks</th>
        <th style="text-align:right;width:80px">Score</th>
      </tr></thead>
      <tbody id="standingsTbody">
        <tr><td colspan="4" style="text-align:center;padding:40px;color:#4a6a4a;">Loading...</td></tr>
      </tbody>
    </table>
  </div>

  <div class="tab-content" id="tab-leaderboard">
    <table>
      <thead><tr>
        <th style="width:60px">Pos</th>
        <th>Golfer</th>
        <th style="text-align:right;width:70px">Odds</th>
        <th style="width:120px">Multiplier</th>
        <th style="text-align:right;width:80px">Score</th>
      </tr></thead>
      <tbody id="lbTbody">
        <tr><td colspan="5" style="text-align:center;padding:40px;color:#4a6a4a;">No leaderboard data yet.</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
const BIN_ID = "69dbe2acaaba882197efdb9e";

const ODDS = {"Scottie Scheffler":5,"Jon Rahm":9.5,"Bryson DeChambeau":10,"Rory McIlroy":12,"Ludvig Åberg":15,"Xander Schauffele":16,"Matt Fitzpatrick":20,"Cameron Young":20,"Tommy Fleetwood":22,"Collin Morikawa":30,"Justin Rose":30,"Robert MacIntyre":33,"Patrick Reed":35,"Hideki Matsuyama":40,"Min Woo Lee":40,"Chris Gotterup":45,"Jordan Spieth":45,"Brooks Koepka":45,"Si Woo Kim":50,"Shane Lowry":55,"Russell Henley":55,"Viktor Hovland":55,"Akshay Bhatia":60,"Patrick Cantlay":65,"Jacob Bridgeman":65,"Nicolai Højgaard":65,"Jake Knapp":70,"Adam Scott":70,"Sepp Straka":70,"Tyrrell Hatton":70,"J.J. Spaun":70,"Justin Thomas":70,"Corey Conners":80,"Marco Penge":80,"Sungjae Im":100,"Sam Burns":100,"Harris English":100,"Cameron Smith":100,"Jason Day":100,"Maverick McNealy":100,"Gary Woodland":100,"Brian Harman":125,"Max Homa":125,"Daniel Berger":150,"Rasmus Højgaard":150,"Ben Griffin":150,"Kurt Kitayama":150,"Aaron Rai":150,"Ryan Fox":175,"Casey Jarvis":175,"Keegan Bradley":175,"Dustin Johnson":175,"Alex Noren":175,"Harry Hall":175,"Ryan Gerard":175,"Sam Stevens":225,"Nick Taylor":225,"Michael Kim":225,"Wyndham Clark":225,"Max Greyserman":250,"Sami Valimaki":250,"Sergio Garcia":250,"Haotong Li":250,"Nicolas Echavarria":250,"Carlos Ortiz":250,"Aldrich Potgieter":250,"Rasmus Neergaard-Petersen":350,"Andrew Novak":350,"Tom McKibbin":350,"Michael Brennan":500,"Kristoffer Reitan":500,"John Keefer":500,"Matt McCarty":500,"Davis Riley":750,"Bubba Watson":750,"Charl Schwartzel":750,"Zach Johnson":750,"Angel Cabrera":1000,"Mason Howell":1000,"Fifa Laopakdee":1000,"Ethan Fang":1000,"Brian Campbell":1000,"Vijay Singh":1000,"Jose Maria Olazabal":1000,"Brandon Holtz":1000,"Naoyuki Kataoka":1000,"Danny Willett":1000,"Jackson Herrington":1000,"Fred Couples":1000,"Mateo Pulcini":1000,"Mike Weir":1000};
const POS_MULT = {1:10,2:9,3:8,4:7,5:6,6:5,7:4,8:3,9:2,10:1};

async function fetchData(){
  try{
    const r = await fetch("https://api.jsonbin.io/v3/b/" + BIN_ID + "/latest");
    if(!r.ok) throw new Error();
    const j = await r.json();
    const data = j.record || {};
    renderAll(data);
    document.getElementById("liveStatus").textContent = "Last updated: " + (data.lastUpdated || "not yet updated");
  }catch(e){
    document.getElementById("liveStatus").textContent = "Unable to load latest scores";
  }
}

function buildMultMap(leaderboard){
  const map={};
  (leaderboard||[]).forEach(e=>{
    const m=POS_MULT[e.position]||0;
    if(m>0) map[e.name]={mult:m,position:e.position};
  });
  return map;
}

function calcScore(participant, mm){
  let total=0;
  const details=[];
  (participant.picks||[]).forEach(pick=>{
    const odds=ODDS[pick]||0;
    const mult=(mm[pick]&&mm[pick].mult)||0;
    total += odds*mult;
    details.push({name:pick,mult});
  });
  return {total,details};
}

function renderStandings(data){
  const mm = buildMultMap(data.leaderboard||[]);
  const rows = (data.participants||[]).map(p => ({...calcScore(p,mm), pname:p.name}));
  rows.sort((a,b)=>b.total-a.total);
  let dr=1, prev=null, cnt=0;
  const tbody=document.getElementById("standingsTbody");
  tbody.innerHTML="";
  rows.forEach(row=>{
    cnt++;
    if(row.total!==prev) dr=cnt;
    prev=row.total;
    const rc=dr===1?"rank-1":dr===2?"rank-2":dr===3?"rank-3":"rank-x";
    const tags=row.details.map(d=>`<span class="tag ${d.mult>0?"scoring":""}">${d.name}${d.mult>0?`<span class="mult">×${d.mult}</span>`:""}</span>`).join("");
    const tr=document.createElement("tr");
    tr.innerHTML=`<td><span class="rank ${rc}">${dr}</span></td><td><strong>${row.pname}</strong></td><td><div class="tags">${tags}</div></td><td style="text-align:right"><span class="${row.total>0?"score":"score score-zero"}">${row.total}</span></td>`;
    tbody.appendChild(tr);
  });
}

function renderLeaderboard(data){
  const tbody=document.getElementById("lbTbody");
  const leaderboard = data.leaderboard || [];
  if(!leaderboard.length){
    tbody.innerHTML=`<tr><td colspan="5" style="text-align:center;padding:40px;color:#4a6a4a;">No leaderboard data yet.</td></tr>`;
    return;
  }
  tbody.innerHTML="";
  const grouped={};
  leaderboard.forEach(e=>{
    if(!grouped[e.position]) grouped[e.position]=[];
    grouped[e.position].push(e.name);
  });
  Object.keys(grouped).map(Number).sort((a,b)=>a-b).forEach(pos=>{
    grouped[pos].forEach(name=>{
      const mult=POS_MULT[pos]||0;
      const odds=ODDS[name]||"?";
      const score=mult&&odds!=="?"?(odds*mult):"—";
      const tr=document.createElement("tr");
      tr.innerHTML=`<td><span class="pos">${grouped[pos].length>1?"T":""}${pos}</span></td><td>${name}</td><td style="text-align:right">${odds}</td><td>${mult?`<span class="mbadge">×${mult}</span>`:`<span class="no-mult">Not scoring</span>`}</td><td style="text-align:right">${score}</td>`;
      tbody.appendChild(tr);
    });
  });
}

function renderAll(data){
  renderStandings(data);
  renderLeaderboard(data);
}

function showTab(id,btn){
  document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  document.getElementById("tab-"+id).classList.add("active");
  btn.classList.add("active");
}

fetchData();
setInterval(fetchData, 60000);
</script>
</body>
</html>
